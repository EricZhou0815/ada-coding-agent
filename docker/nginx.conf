upstream api_backend {
    # Load balancing method: least_conn (route to least busy server)
    # Alternative: ip_hash (session affinity), round_robin (default)
    least_conn;
    
    # Docker Compose service name - resolves to all scaled instances
    # Docker's DNS will round-robin across api_1, api_2, api_3, etc.
    server api:80 max_fails=3 fail_timeout=30s;
}

# Use Docker's embedded DNS for service discovery
# 127.0.0.11 is Docker's DNS server in bridge networks
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

server {
    listen 80;
    server_name localhost;

    # Increase timeouts for long-running LLM requests
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;

    # Buffer settings for large payloads
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy all requests to API backend
    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed for future SSE/WebSocket endpoints)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Disable buffering for streaming responses
        proxy_buffering off;
        
        # Add response headers to identify which backend served the request
        add_header X-Upstream-Server $upstream_addr always;
    }

    # Nginx status for monitoring (optional)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
